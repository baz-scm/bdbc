name: Release
run-name: Release triggered by ${{ github.actor }}

on:
  workflow_dispatch: {}

permissions:
  contents: write
  id-token: write

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 22
          registry-url: "https://registry.npmjs.org"

      - name: Upgrade npm for Trusted Publishing support
        run: npm install -g npm@latest

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: latest

      - name: Read version
        id: version
        run: echo "version=$(node -p "require('./package.json').version")" >> "$GITHUB_OUTPUT"

      - name: Check tag does not already exist
        run: |
          if git ls-remote --exit-code --tags origin "refs/tags/v${{ steps.version.outputs.version }}" >/dev/null 2>&1; then
            echo "Tag v${{ steps.version.outputs.version }} already exists. Bump the version in package.json before releasing." >&2
            exit 1
          fi

      - name: Build binaries
        run: |
          mkdir -p dist
          declare -A targets=(
            [darwin-arm64]=bun-darwin-arm64
            [darwin-x64]=bun-darwin-x64
            [linux-arm64]=bun-linux-arm64
            [linux-x64]=bun-linux-x64
          )
          for name in "${!targets[@]}"; do
            bun build --compile --minify --target="${targets[$name]}" src/server.ts --outfile "dist/bdbc-${name}"
          done
          ls -la dist

      - name: Publish to npm
        run: npm publish --access public --provenance

      - name: Tag release
        run: |
          git tag "v${{ steps.version.outputs.version }}"
          git push origin "v${{ steps.version.outputs.version }}"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "v${{ steps.version.outputs.version }}" dist/* \
            --title "v${{ steps.version.outputs.version }}" \
            --generate-notes
